# ==========================================
# TFT-Sniper 配置文件
# 运行时按 Cmd+Shift+R 热重载
# ==========================================

# 目标英雄名单（留空 = 不购买）
target_heroes = ["千珏", "德莱文", "奥恩", "盖伦", "佛耶戈", "布里次"]

# Shift+D 后的固定等待时间（秒）
animation_delay = 0.4

# 连续按 Shift+D 的防抖冷却（秒）
debounce_cooldown = 0.05

# 调试模式: 保存截图、打印 OCR 原文/置信度/耗时
debug = true

# 商店卡牌行的截图区域（Point 坐标，非像素）
# 当 [window].enabled = false 时，这里是屏幕绝对坐标
# 当 [window].enabled = true 时，这里是相对金铲铲窗口左上角的坐标
# 需覆盖 5 张卡的名称文字区域；启用窗口模式后建议重新运行 calibrate.py
[roi]
top = 1262
left = 596
width = 1408
height = 52

# 购买点击的 y 坐标（Point）
# 仅在未启用手工点击点位时作为回退值使用
click_y = 1210

# 金铲铲窗口自动跟随
# enabled = true 后，ROI 和点击点位都按相对窗口坐标解算
[window]
enabled = true
bundle_id = "com.tencent.jkchess"

# 仅用于窗口尺寸告警；如果大小变化，建议重新运行 calibrate.py
reference_width = 2316
reference_height = 1330

# 手工点击点位
# 当 [window].enabled = true 时，下方坐标是相对窗口左上角的 Point
# 当 [window].enabled = false 时，下方坐标是屏幕绝对 Point
[click]
use_slot_points = true

# 从左到右 5 个卡槽的点击中心点
slot_points = [
  { x = 729, y = 1181 },
  { x = 1023, y = 1182 },
  { x = 1299, y = 1180 },
  { x = 1591, y = 1183 },
  { x = 1862, y = 1179 },
]

# 每次点击时的微抖动范围（Point）
jitter_x = 0
jitter_y = 0

# 拟人化点击时序（毫秒）
move_settle_ms = 16
hold_ms = 18
inter_click_ms = 70
post_batch_ms = 18
timing_jitter_ms = 4
