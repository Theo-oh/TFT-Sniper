# ==========================================
# TFT-Sniper 配置文件
# 热重载: 运行时按 Cmd+Shift+R 即时生效
# ==========================================

# 目标英雄名单（留空 = 不按名匹配）
target_heroes = ["俄洛伊", "德莱文", "佛耶戈","崔斯特"]

# 目标价格列表（留空 = 不按价格匹配）
# 名字和价格是 OR 关系，任一命中即购买
target_costs = []

# 按 d 后等待卡牌翻转动画的时间（秒）
# 太短会截到旧牌，太长会影响速度，建议 0.3 ~ 0.5 之间调试
animation_delay = 0.4

# 连续按 d 的防抖冷却（秒）
debounce_cooldown = 0.05

# OCR 识别级别: "accurate"（中文必须）或 "fast"（仅英文）
recognition_level = "accurate"

# 调试模式: 保存截图、打印 OCR 原文/置信度/耗时
debug = true

# 商店卡牌行的截图区域（Point 坐标，非像素）
# 需覆盖 5 张卡的名称+价格文本区域
# 首次使用请开启 debug 模式校准
[roi]
top = 1432
left = 958
width = 1387
height = 36

# 购买点击的 y 坐标（Point）
# 0 = 使用 ROI 垂直中心
# 若 ROI 只截文字区域，可设为卡牌中部的 y 坐标
click_y = 1396
